# =============================================
# application-test.properties — test profili
# H2 in-memory, bot token mock
# =============================================

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Bot — test uchun to'g'ri format (TelegramBots kutubxonasi talab qiladi)
bot.token=0000000000:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA0
bot.username=TestBot
bot.reminder-cron=0 0 9 * * *
bot.change-deadline=13:00
bot.admin-ids=999999999
bot.default-language=uz

logging.level.org.springframework=WARN
logging.level.com.example.demo=DEBUG
